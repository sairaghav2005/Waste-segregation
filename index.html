<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Segregation AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #fff;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 10px;
        }

        input {
            display: none;
        }

        img {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>♻️ Waste Segregation AI</h1>

        <div class="upload-box" id="uploadBox">
            Click or Drag Image Here
        </div>

        <input type="file" id="fileInput" accept="image/*">

        <img id="preview">

        <button id="analyzeBtn" disabled>Analyze Image</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        /* =========================
           🔥 YOUR RENDER BACKEND
        ========================= */
        const BACKEND_URL = "https://waste-segregation-1-w9qr.onrender.com";

        /* =========================
           ELEMENTS
        ========================= */
        const uploadBox = document.getElementById("uploadBox");
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const analyzeBtn = document.getElementById("analyzeBtn");
        const result = document.getElementById("result");

        let selectedFile = null;
        
        // Wake up Render backend on load
        window.onload = () => {
            fetch(BACKEND_URL).catch(e => console.log("Waking up..."));
        };

        /* =========================
           UPLOAD CLICK
        ========================= */
        uploadBox.onclick = () => fileInput.click();

        /* =========================
           FILE SELECT
        ========================= */
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];

            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(selectedFile);

            analyzeBtn.disabled = false;
        };

        /* =========================
           ANALYZE IMAGE
        ========================= */
        analyzeBtn.onclick = async () => {
            if (!selectedFile) return;

            analyzeBtn.innerText = "Analyzing...";

            const formData = new FormData();
            formData.append("image", selectedFile);

            try {
                const response = await fetch(`${BACKEND_URL}/upload`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Server error");
                }

                result.innerHTML = `
            <h3>Category: ${data.category}</h3>
            <p><b>Prediction:</b> ${data.prediction}</p>
            <p><b>Confidence:</b> ${data.confidence}%</p>
            <p><b>Advice:</b> ${data.advice}</p>
            <p><b>Dump Location:</b> ${data.dump_location}</p>
        `;

            } catch (err) {
                console.error("Connection Error:", err);
                result.innerHTML = `❌ Connection Error: ${err.message}. <br><small>Make sure the backend is awake (it takes 30s on first load).</small>`;
            }

            analyzeBtn.innerText = "Analyze Image";
        };
    </script>

</body>

</html>
