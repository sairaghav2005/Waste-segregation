<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Segregation AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* ===== YOUR FULL CSS (UNCHANGED) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }

        .preview-image {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <h1>♻️ Waste Segregation AI</h1>

            <div class="upload-area" id="uploadArea">
                <p>Click or drag image here</p>
                <input type="file" id="fileInput" hidden>
            </div>

            <img id="preview" class="preview-image" style="display:none;">

            <button class="btn btn-primary" id="analyzeBtn" disabled>
                Analyze
            </button>

            <div id="result"></div>

        </div>
    </div>

    <script>
        /* =========================
           🔥 BACKEND CONFIG (IMPORTANT)
        ========================= */
        const BACKEND_URL = "https://waste-segregation-1-w9qr.onrender.com";

        /* =========================
           ELEMENTS
        ========================= */
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const analyzeBtn = document.getElementById("analyzeBtn");
        const result = document.getElementById("result");

        let selectedFile = null;

        /* =========================
           UPLOAD HANDLING
        ========================= */
        uploadArea.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];

            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(selectedFile);

            analyzeBtn.disabled = false;
        };

        /* =========================
           ANALYZE IMAGE
        ========================= */
        analyzeBtn.onclick = async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append("image", selectedFile);

            analyzeBtn.innerText = "Analyzing...";

            try {
                const res = await fetch(`${BACKEND_URL}/upload`, {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                result.innerHTML = `
            <h3>Category: ${data.category}</h3>
            <p>Prediction: ${data.prediction}</p>
            <p>Confidence: ${data.confidence}%</p>
            <p>Advice: ${data.advice}</p>
        `;

            } catch (err) {
                result.innerHTML = "<p>Error connecting to backend</p>";
            }

            analyzeBtn.innerText = "Analyze";
        };
    </script>

</body>

</html>
